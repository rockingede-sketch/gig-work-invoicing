{% load static %}

<!doctype html>
<html lang="fi">
  <head>
    <meta charset="UTF-8" />
    <title>Keikkalasku</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="d-flex flex-column min-vh-100">
    <!-- HEADER -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
      <div class="container">
        <a class="navbar-brand" href="/">Keikkalasku</a>

        <div>
          <a class="btn btn-link text-white" href="/">Etusivu</a>
          <a class="btn btn-link text-white" href="/invoices/">Laskutus</a>
          <a class="btn btn-link text-white" href="{% url 'loginLink' %}"
            >Kirjaudu</a
          >
        </div>
      </div>
    </nav>

    <!-- PAGE CONTENT -->
    <main class="container my-4">{% block content %} {% endblock %}</main>

    <!-- FOOTER (optional) -->
    <footer class="mt-auto text-center py-3 text-muted">
      © 2026 Keikkalasku
    </footer>
  </body>
</html>
