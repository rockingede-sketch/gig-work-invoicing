{% extends "base.html" %} {% block content %}
<div
  class="d-flex justify-content-center align-items-center min-vh-100 bg-light px-3"
>
  <div
    class="card shadow-sm"
    style="max-width: 420px; width: 100%; border-radius: 12px"
  >
    <div class="card-body p-4">
      <h4 class="fw-semibold mb-3">Unohtunut salasana</h4>

      <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
          <label class="form-label">Sähköposti</label>
          <input type="email" name="email" class="form-control" required />
        </div>

        <button type="submit" class="btn btn-primary w-100 py-2 mt-2">
          Lähetä palautuslinkki
        </button>

        <hr class="my-4" />

        <div class="text-center">
          <a href="{% url 'loginLink' %}" class="btn btn-outline-primary w-100">
            Takaisin kirjautumiseen
          </a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
