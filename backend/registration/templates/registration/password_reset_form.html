{% extends "base.html" %} {% block content %}

<div
  class="d-flex justify-content-center align-items-center min-vh-100 bg-light px-3"
>
  <div
    class="card shadow-sm"
    style="max-width: 420px; width: 100%; border-radius: 12px"
  >
    <div class="card-body p-4">
      <h4 class="fw-semibold mb-3">Unohtunut salasana</h4>

      <p class="text-muted small mb-3">
        Syötä sähköpostiosoitteesi, niin lähetämme sinulle palautuslinkin.
      </p>

      <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
          <label class="form-label"> {{ form.email.label }} </label>

          {{ form.email }} {% if form.email.errors %}
          <div class="text-danger small mt-1">{{ form.email.errors }}</div>
          {% endif %}
        </div>

        <button type="submit" class="btn btn-primary w-100 py-2 mt-2">
          Lähetä palautuslinkki
        </button>
      </form>
    </div>
  </div>
</div>

{% endblock %}
