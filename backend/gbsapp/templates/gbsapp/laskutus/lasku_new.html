{% extends "../../base.html" %}
{% block title %}Laskutus{% endblock %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-2">
  <h1>Luo lasku</h1>
</div>

<form method="post" action="{% url 'lasku_new' %}">

    {% csrf_token %}

    <div class="card mb-3">
    <div class="card-body">
        <h6 class="text-muted text-uppercase small mb-3">Työn tiedot</h6>
        <div class="mb-3">
            <label class="form-label">{{ form.work_task.label }}</label>
            {{ form.work_task }}
            <div class="text-danger small">{{ form.work_task.errors }}</div>
        </div>
        <!-- rest of job fields -->
    </div>
  </div>

<div class="card mb-3">
    <div class="card-body">
        <h6 class="text-muted text-uppercase small mb-3">Yhteystiedot</h6>
        <!-- contact fields -->
        
        <input type="checkbox" 
          name="group_billing"
          hx-get="{% url 'group_billing_fields' %}"
          hx-trigger="change"
          hx-target="#group-fields"
          hx-swap="innerHTML">

          <div id="group-fields">
              <!-- group fields appear here when checked -->
          </div>

    </div>
</div>



    <button type="submit" class="btn btn-success">Tallenna</button>
</form>

{% endblock %}
